version: "3.9"

services:
  php:
    image: jesusabarcag/php-dev:8.3
    container_name: graphql-basic-client-php83
    working_dir: /workspace
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-debug,develop}
      XDEBUG_START_WITH_REQUEST: ${XDEBUG_START_WITH_REQUEST:-yes}
      XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host.docker.internal}
      XDEBUG_CLIENT_PORT: ${XDEBUG_CLIENT_PORT:-9003}
      XDEBUG_IDEKEY: ${XDEBUG_IDEKEY:-VSCODE}
      XDEBUG_LOG_LEVEL: ${XDEBUG_LOG_LEVEL:-0}
    volumes:
      - ../:/workspace
      - ./xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    command: tail -f /dev/null
